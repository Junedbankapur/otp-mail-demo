<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f5f5f5;
        }

        .container {
            background: white;
            padding: 30px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }

        .success { color: green; }
        .error { color: red; }
        .loading { color: blue; }
    </style>
</head>
<body>

<div class="container">
    <h2>OTP Verification</h2>

    <!-- EMAIL -->
    <input type="email" id="email" placeholder="Enter your email">

    <button onclick="sendOtp()">Send OTP</button>

    <!-- OTP FIELD -->
    <input type="text" id="otp" placeholder="Enter OTP">

    <button onclick="verifyOtp()">Verify OTP</button>

    <p id="message"></p>
</div>

<script>

async function sendOtp() {
    const email = document.getElementById("email").value;
    const message = document.getElementById("message");

    if (!email) {
        message.innerText = "Enter email first!";
        message.className = "error";
        return;
    }

    message.innerText = "Sending OTP...";
    message.className = "loading";

    try {
        const response = await fetch(`/api/otp/send?email=${encodeURIComponent(email)}`, {
            method: "POST"
        });

        const result = await response.text();

        if (response.ok) {
            message.innerText = result;
            message.className = "success";
        } else {
            message.innerText = result;
            message.className = "error";
        }

    } catch (error) {
        message.innerText = "Server error!";
        message.className = "error";
        console.error(error);
    }
}


async function verifyOtp() {
    const email = document.getElementById("email").value;
    const otp = document.getElementById("otp").value;
    const message = document.getElementById("message");

    if (!email || !otp) {
        message.innerText = "Enter email and OTP!";
        message.className = "error";
        return;
    }

    message.innerText = "Verifying OTP...";
    message.className = "loading";

    try {
        const response = await fetch(`/api/otp/verify?email=${encodeURIComponent(email)}&otp=${encodeURIComponent(otp)}`, {
            method: "POST"
        });

        const result = await response.text();

        if (response.ok) {
            message.innerText = result;
            message.className = "success";
        } else {
            message.innerText = result;
            message.className = "error";
        }

    } catch (error) {
        message.innerText = "Server error!";
        message.className = "error";
        console.error(error);
    }
}

</script>

</body>
</html>
